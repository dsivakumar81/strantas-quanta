services:
  postgres:
    image: postgres:16-alpine
    container_name: quanta-postgres
    environment:
      POSTGRES_DB: quanta
      POSTGRES_USER: quanta
      POSTGRES_PASSWORD: quanta
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quanta -d quanta"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: quanta-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
